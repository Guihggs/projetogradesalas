<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Grade de turmas - Polo DF | DEMÀ Aprendiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Cores DEMÀ - Manual da Marca */
            --dema-vermelho: #D32C4D;
            --dema-azul: #402EDD;
            --dema-amarelo: #ED9E06;
            --dema-carbono: #212220;
            --dema-branco: #FFFFFF;
            
            /* Cores de suporte */
            --verde-matricula: #28a745;
            --laranja-pre: #fd7e14;
            
            /* Efeitos */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        body {
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--dema-azul) 0%, var(--dema-vermelho) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        .header-banner {
            background: var(--dema-branco);
            padding: 12px 30px;
            border-bottom: 5px solid var(--dema-amarelo);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .header-content {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo-dema-img { 
            height: 70px; 
            width: auto; 
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex-grow: 1;
            width: 100%;
        }

        /* ── SEARCH (LIQUID GLASS) ── */
        .search-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 30px;
            padding: 14px 26px;
            margin: 15px 0 20px 0;
            display: none;
            align-items: center;
            gap: 14px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-container:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.45);
        }
        .search-icon { 
            font-size: 1.4rem; 
            color: var(--dema-amarelo); 
            filter: drop-shadow(0 0 8px rgba(237, 158, 6, 0.5));
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 8px;
            font-family: 'Space Grotesk', sans-serif;
        }
        .search-input::placeholder { 
            color: rgba(255, 255, 255, 0.65); 
            font-weight: 400; 
        }
        .clear-search {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.2rem;
            width: 36px; 
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .clear-search:hover { 
            background: rgba(255, 255, 255, 0.35); 
            transform: rotate(90deg) scale(1.1);
        }
        .clear-search.visible { display: flex; }

        /* ── PRÉDIO SELECT (LIQUID GLASS) ── */
        .predio-filter-container {
            display: none;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .predio-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .predio-select-wrapper {
            flex: 1;
            min-width: 240px;
            position: relative;
        }
        .predio-select {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 50px 12px 22px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            transition: all 0.3s ease;
            box-shadow: var(--glass-shadow);
        }
        .predio-select:hover { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .predio-select:focus { 
            border-color: var(--dema-amarelo); 
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 3px rgba(237, 158, 6, 0.2);
        }
        .predio-select option { 
            background: var(--dema-carbono); 
            color: white; 
            font-weight: 600; 
        }
        .select-arrow {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dema-amarelo);
            font-size: 1.1rem;
            pointer-events: none;
            filter: drop-shadow(0 0 6px rgba(237, 158, 6, 0.4));
        }
        .predio-badge-count {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-border);
            color: var(--dema-amarelo);
            font-size: 0.8rem;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 25px;
            white-space: nowrap;
            box-shadow: var(--glass-shadow);
            text-shadow: 0 0 10px rgba(237, 158, 6, 0.5);
        }

        /* ── DAY FILTER BAR (LIQUID GLASS) ── */
        .day-filter-bar {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 50px;
            padding: 6px;
            margin-bottom: 26px;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-start;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        .btn-dia {
            background: transparent;
            border: 1px solid transparent;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 45px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .btn-dia:hover { 
            background: rgba(255, 255, 255, 0.15); 
            color: white;
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .btn-dia.active { 
            background: var(--dema-amarelo);
            color: var(--dema-carbono); 
            border-color: var(--dema-amarelo);
            box-shadow: 0 4px 15px rgba(237, 158, 6, 0.4);
            transform: translateY(-2px);
        }

        /* ── MAIN CONTENT ── */
        .grade-content { 
            animation: fadeSlideUp 0.4s ease-out; 
        }

        .dia-section { margin-bottom: 36px; }
        .dia-section.hidden { display: none; }

        .dia-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 3px;
        }
        .dia-pill {
            background: var(--dema-amarelo);
            color: var(--dema-carbono);
            padding: 11px 26px;
            border-radius: 16px 16px 0 0;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 0.8px;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(237, 158, 6, 0.3);
        }
        .dia-count {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 22px;
        }

        .turno-sub {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid rgba(255, 255, 255, 0.3);
            margin: 5px 0;
            font-size: 0.85rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.75);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .turno-sub.mat { 
            border-left-color: var(--dema-amarelo); 
            color: var(--dema-amarelo); 
        }
        .turno-sub.vesp { 
            border-left-color: var(--dema-vermelho); 
            color: var(--dema-vermelho); 
        }

        /* ── DIVISOR DE ANDAR (LIQUID GLASS) ── */
        .andar-divider {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 16px 0 8px 0;
        }
        .andar-divider:first-of-type { margin-top: 5px; }
        .andar-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-border);
            color: var(--dema-amarelo);
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 8px 18px;
            border-radius: 24px;
            white-space: nowrap;
            box-shadow: var(--glass-shadow);
        }
        .andar-badge-icon { 
            font-size: 1.1rem; 
            filter: drop-shadow(0 0 6px rgba(237, 158, 6, 0.5));
        }
        .andar-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(237, 158, 6, 0.5), transparent);
        }

        .grid-salas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            padding: 22px;
            border-radius: 0 20px 20px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* ── CARDS (LIQUID GLASS) ── */
        .sala-item {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 6px solid var(--dema-amarelo);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .sala-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(237, 158, 6, 0.05) 0%, 
                rgba(64, 46, 221, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .sala-item:hover::before {
            opacity: 1;
        }
        .sala-item:hover { 
            transform: translateY(-6px) scale(1.02); 
            box-shadow: 0 16px 48px 0 rgba(31, 38, 135, 0.35);
            border-left-color: var(--dema-vermelho);
        }
        .sala-item.hidden { display: none; }

        .info-label {
            font-size: 0.7rem;
            color: #5a6874;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 12px;
        }
        .info-label:first-of-type { margin-top: 0; }
        .info-value {
            font-weight: 700;
            color: var(--dema-carbono);
            font-size: 1rem;
            margin-bottom: 5px;
            word-break: break-word;
        }
        .prof-name {
            color: var(--dema-azul);
            font-size: 1.1rem;
            border-bottom: 3px solid var(--dema-amarelo);
            padding-bottom: 8px;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .sala-destaque { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: var(--dema-vermelho);
            text-shadow: 0 2px 4px rgba(211, 44, 77, 0.2);
        }

        .alunos-container {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed rgba(211, 44, 77, 0.2);
        }
        .aluno-badge {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 11px 8px;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .aluno-badge:hover { 
            transform: scale(1.08) translateY(-3px);
        }
        .aluno-badge.matriculado {
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.15), rgba(40, 167, 69, 0.25));
            border: 2px solid var(--verde-matricula);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }
        .aluno-badge.pre-matriculado {
            background: linear-gradient(135deg, rgba(253, 126, 20, 0.15), rgba(253, 126, 20, 0.25));
            border: 2px solid var(--laranja-pre);
            box-shadow: 0 4px 12px rgba(253, 126, 20, 0.2);
        }
        .aluno-badge-icon { 
            font-size: 1.2rem; 
            margin-bottom: 4px; 
        }
        .aluno-badge-numero { 
            font-size: 1.6rem; 
            font-weight: 900; 
            line-height: 1; 
            margin-bottom: 3px; 
        }
        .aluno-badge.matriculado .aluno-badge-numero { color: var(--verde-matricula); }
        .aluno-badge.pre-matriculado .aluno-badge-numero { color: var(--laranja-pre); }
        .aluno-badge-label { 
            font-size: 0.64rem; 
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 0.5px; 
            text-align: center; 
            line-height: 1.2; 
        }
        .aluno-badge.matriculado .aluno-badge-label { color: #1b5e20; }
        .aluno-badge.pre-matriculado .aluno-badge-label { color: #e65100; }

        /* ── EMPTY / LOADING ── */
        .empty-message {
            background: rgba(255, 255, 240, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 30px 22px;
            text-align: center;
            color: var(--dema-carbono);
            font-weight: 600;
            font-size: 1rem;
            grid-column: 1 / -1;
            border: 1px solid rgba(237, 158, 6, 0.3);
        }
        .loading {
            color: white;
            text-align: center;
            padding: 70px 24px;
            font-size: 1.4rem;
            font-weight: 500;
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 45px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* ── SEARCH RESULT COUNT ── */
        .search-result-info {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
            padding: 0 5px;
        }
        .search-result-info.visible { display: block; }

        /* ── NO RESULTS FULL ── */
        .no-results-full {
            display: none;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            padding: 55px 24px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .no-results-full.visible { display: block; }

        /* ── FOOTER ── */
        footer {
            background: var(--dema-amarelo);
            padding: 24px;
            text-align: center;
            margin-top: 45px;
            border-top: 3px solid rgba(0, 0, 0, 0.05);
        }
        footer p {
            font-size: 0.75rem;
            margin-top: 12px;
            color: var(--dema-carbono);
            font-weight: 600;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .header-content { flex-direction: column; text-align: center; }
            .btn-dia { padding: 8px 15px; font-size: 0.85rem; }
            .grid-salas { padding: 16px; gap: 16px; grid-template-columns: 1fr; }
            .dia-pill { font-size: 0.95rem; padding: 9px 18px; }
            .search-container { padding: 12px 16px; }
            .search-input { font-size: 1rem; }
            .predio-filter-container { flex-direction: column; align-items: stretch; }
            .predio-label { text-align: center; }
            .logo-dema-img { height: 55px; }
        }
    </style>
</head>
<body>

<header class="header-banner">
    <div class="header-content">
        <img src="demalogo.png" alt="Logo DEMÀ Aprendiz" class="logo-dema-img" onerror="this.style.display='none'">
    </div>
</header>

<div class="container">
    <div id="loading" class="loading">📅 Buscando turmas e salas...</div>

    <!-- Busca por instrutor -->
    <div id="searchContainer" class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input"
               placeholder="Buscar por nome do instrutor..." autocomplete="off">
        <button id="clearSearch" class="clear-search">✕</button>
    </div>

    <div id="searchResultInfo" class="search-result-info"></div>

    <!-- Filtro por Prédio -->
    <div id="predioFilterContainer" class="predio-filter-container">
        <span class="predio-label">🏢 Prédio</span>
        <div class="predio-select-wrapper">
            <select id="predioSelect" class="predio-select">
                <option value="todos">Todos os prédios</option>
            </select>
            <span class="select-arrow">▾</span>
        </div>
        <span id="predioBadge" class="predio-badge-count">0 salas</span>
    </div>

    <!-- Filtro de dias -->
    <div id="dayFilterBar" class="day-filter-bar">
        <button class="btn-dia active" data-dia="todos">📌 Todos</button>
        <button class="btn-dia" data-dia="diaria">🔁 Diária</button>
        <button class="btn-dia" data-dia="2">Seg</button>
        <button class="btn-dia" data-dia="3">Ter</button>
        <button class="btn-dia" data-dia="4">Qua</button>
        <button class="btn-dia" data-dia="5">Qui</button>
        <button class="btn-dia" data-dia="6">Sex</button>
    </div>

    <!-- Conteúdo principal -->
    <div id="gradeContent" class="grade-content"></div>
    <div id="noResults" class="no-results-full">📭 Nenhuma sala encontrada para os filtros selecionados.</div>
</div>

<footer>
    <img src="demalogo.png" alt="Logo DEMÀ Aprendiz"
         style="height:45px;width:auto;opacity:0.95;" onerror="this.style.display='none'">
    <p>Um futuro para cada história.</p>
</footer>

<script>
const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTKdS9Fy5s2qdtqXIWGmuzp8l3KGVwLXRa2l0QIsQf5r0G-Sm6wZ_V84-8UEHRexnHvwooUo_loVCwH/pub?output=csv';

const DIAS_MAP  = { '0':'Diária', '2':'Segunda-feira', '3':'Terça-feira', '4':'Quarta-feira', '5':'Quinta-feira', '6':'Sexta-feira' };
const DIAS_KEYS = ['0','2','3','4','5','6'];
const DIAS_ICONS= { '0':'🔁', '2':'📅', '3':'📅', '4':'📅', '5':'📅', '6':'📅' };

/* Ícones e rótulos de andar — 'T' = Térreo (sala sem info de andar) */
const ANDAR_INFO = {
    'T': { label: 'Térreo',                 icon: '🏗️' },
    '1': { label: '1º Andar',               icon: '🏠' },
    '2': { label: '2º Andar',               icon: '🏢' },
    '3': { label: '3º Andar',               icon: '🏬' },
    '?': { label: 'Andar não identificado', icon: '❓' }
};

let allData    = [];
let activeDia  = 'todos';
let activePred = 'todos';
let searchTerm = '';
let predioList = [];

/* ── CSV parser ── */
function parseCSV(csvText) {
    const rows = [];
    let row = [], field = '', inQ = false;
    for (let i = 0; i < csvText.length; i++) {
        const c = csvText[i], n = csvText[i+1];
        if (c === '"') { if (inQ && n === '"') { field += '"'; i++; } else inQ = !inQ; }
        else if (c === ',' && !inQ) { row.push(field.trim()); field = ''; }
        else if (c === '\n' && !inQ) {
            row.push(field.trim());
            if (!(row.length === 1 && row[0] === '')) rows.push(row);
            row = []; field = '';
        } else field += c;
    }
    if (field !== '' || row.length) { row.push(field.trim()); if (!(row.length === 1 && row[0] === '')) rows.push(row); }
    return rows;
}

/* Identificar andar a partir do texto da coluna SALA_TURMADISCIPLINA.
   Retorna 'T' (Térreo) quando não há informação de andar. */
function extrairAndar(nomeSala) {
    if (!nomeSala) return 'T';
    const s = nomeSala.toUpperCase()
        .replace(/º|°/g, 'O')
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '');
    if (s.includes('1O ANDAR') || s.includes('1 ANDAR')) return '1';
    if (s.includes('2O ANDAR') || s.includes('2 ANDAR')) return '2';
    if (s.includes('3O ANDAR') || s.includes('3 ANDAR')) return '3';
    return 'T'; // sem menção de andar = térreo
}

/* ── Verifica se é PLATAFORMA CONECTADA ── */
function isPlataformaConectada(nomeSala) {
    if (!nomeSala) return false;
    const s = nomeSala.toUpperCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '');
    return s.includes('PLATAFORMA CONECTADA');
}

/* ── Identify day + shift from CODTURMA ── */
function extrairDiaETurno(cod) {
    if (!cod) return { dia: '0', turno: 'M' };
    const m = cod.match(/\.(\d)([MV])\./i);
    if (!m) return { dia: '0', turno: 'M' };
    return { dia: m[1], turno: m[2].toUpperCase() };
}

/* ── Normalize prédio name ── */
function normalizarPredio(s) {
    return (s || '').trim() || 'Não informado';
}

/* ── XSS escape ── */
function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function removerAcentos(s) {
    return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

/* ── Build a sala card (suporta múltiplas turmas agrupadas) ── */
function cardHTML(items) {
    if (!Array.isArray(items)) items = [items];

    const first = items[0];
    const predio    = esc(first['PREDIO_NOME_TURMADISC'] || 'Local não informado');
    const sala      = esc(first['SALA_TURMADISCIPLINA'] || '—');
    const predioKey = esc(normalizarPredio(first['PREDIO_NOME_TURMADISC']));
    const andar     = extrairAndar(first['SALA_TURMADISCIPLINA'] || '');

    const searchTerms = items.map(i => removerAcentos((i['NOME PROFESSOR(A)']||'').toLowerCase())).join(' ');
    const instrutores = [...new Set(items.map(i => i['NOME PROFESSOR(A)'] || 'A definir'))];
    const instrutorUnico = instrutores.length === 1;
    const totalMatric = items.reduce((sum, i) => sum + parseInt(i['ALUNOS STATUSMATRICULADO_TURMA_DISCIPLINA'] || '0'), 0);
    const totalPre = items.reduce((sum, i) => sum + parseInt(i['ALUNOS PRE MATRICULADOS_TURMA_DISCIPLINA'] || '0'), 0);

    let html = `<div class="sala-item" data-search="${esc(searchTerms)}" data-predio="${predioKey}" data-andar="${esc(andar)}">`;

    html += `<div class="info-label">Prédio</div>
        <div class="info-value">${predio}</div>
        <div class="info-label">Sala</div>
        <div class="info-value sala-destaque">${sala}</div>`;

    if (items.length > 1) {
        html += `<div style="background:linear-gradient(135deg, rgba(64,46,221,0.1), rgba(211,44,77,0.1));padding:8px 12px;border-radius:12px;margin:10px 0;text-align:center;font-size:0.78rem;font-weight:700;color:#402EDD;border:1px solid rgba(64,46,221,0.2);">
            📚 ${items.length} turmas nesta sala
        </div>`;
    }

    if (instrutorUnico) {
        html += `<div class="info-label">Instrutor(a)</div>
            <div class="info-value prof-name">${esc(instrutores[0])}</div>`;
    }

    items.forEach((item, idx) => {
        const prof      = esc(item['NOME PROFESSOR(A)'] || 'A definir');
        const cod       = esc(item['CODTURMA'] || '---');
        const turmaNome = esc(item['TURMA NOME'] || '');

        if (items.length > 1 && idx > 0) {
            html += `<div style="border-top:1px dashed rgba(211,44,77,0.3);margin:12px 0;padding-top:12px;"></div>`;
        }
        if (!instrutorUnico) {
            html += `<div class="info-label">Instrutor(a)</div>
                <div class="info-value prof-name" style="font-size:0.95rem;">${prof}</div>`;
        }
        html += `<div class="info-label">Código da Turma</div>
            <div class="info-value" style="font-size:${items.length > 1 ? '0.9rem' : '1rem'};">${cod}</div>`;
        if (turmaNome) {
            html += `<div class="info-label">Nome da Turma</div>
                <div class="info-value" style="font-size:${items.length > 1 ? '0.85rem' : '1rem'};">${turmaNome}</div>`;
        }
    });

    html += `<div class="alunos-container">
        <div class="aluno-badge matriculado">
            <div class="aluno-badge-icon">✓</div>
            <div class="aluno-badge-numero">${totalMatric}</div>
            <div class="aluno-badge-label">Matriculados</div>
        </div>
        <div class="aluno-badge pre-matriculado">
            <div class="aluno-badge-icon">⏳</div>
            <div class="aluno-badge-numero">${totalPre}</div>
            <div class="aluno-badge-label">Pré-Matric.</div>
        </div>
    </div>`;

    html += `</div>`;
    return html;
}

/* ── Divisor de andar ── */
function andarDividerHTML(andarKey) {
    const info = ANDAR_INFO[andarKey] || ANDAR_INFO['?'];
    return `<div class="andar-divider" data-andar-div="${esc(andarKey)}" style="grid-column:1/-1">
        <span class="andar-badge">
            <span class="andar-badge-icon">${info.icon}</span>
            ${info.label}
        </span>
        <span class="andar-line"></span>
    </div>`;
}

/* ── Build full grade HTML com agrupamento por sala e divisores de andar ── */
function buildGradeHTML(items) {
    const byDia = {};
    DIAS_KEYS.forEach(k => byDia[k] = { M: {}, V: {} });

    items.forEach(item => {
        const { dia, turno } = extrairDiaETurno(item['CODTURMA']);
        const key = DIAS_KEYS.includes(dia) ? dia : '0';
        const t = turno === 'V' ? 'V' : 'M';
        const sala = item['SALA_TURMADISCIPLINA'] || '—';
        const predio = normalizarPredio(item['PREDIO_NOME_TURMADISC']);
        
        // Se for PLATAFORMA CONECTADA, usar código da turma como chave única
        const salaKey = isPlataformaConectada(sala) 
            ? `${predio}|||${sala}|||${item['CODTURMA']}`
            : `${predio}|||${sala}`;

        if (!byDia[key][t][salaKey]) {
            byDia[key][t][salaKey] = [];
        }
        byDia[key][t][salaKey].push(item);
    });

    let html = '';
    DIAS_KEYS.forEach(diaKey => {
        const matSalas  = byDia[diaKey].M;
        const vespSalas = byDia[diaKey].V;

        const totalMat = Object.values(matSalas).length;
        const totalVesp = Object.values(vespSalas).length;

        if (!totalMat && !totalVesp) return;

        const total = totalMat + totalVesp;
        const label = DIAS_MAP[diaKey] || 'Outro';
        const icon  = DIAS_ICONS[diaKey] || '📅';

        html += `<div class="dia-section" data-dia="${diaKey}">
            <div class="dia-header">
                <span class="dia-pill">${icon} ${label}</span>
                <span class="dia-count">${total} sala${total !== 1 ? 's' : ''}</span>
            </div>
            <div class="grid-salas">`;

        /* ── Renderiza turno com divisores de andar ── */
        function renderTurnoComAndares(salasObj) {
            const porAndar = {};
            Object.entries(salasObj).forEach(([salaKey, turmasNaSala]) => {
                const nomeSala = turmasNaSala[0]['SALA_TURMADISCIPLINA'] || '—';
                const andar = extrairAndar(nomeSala);
                if (!porAndar[andar]) porAndar[andar] = [];
                porAndar[andar].push(turmasNaSala);
            });

            // Térreo ('T') aparece primeiro, depois andares, '?' ao final
            const andarOrdem = ['T', '1', '2', '3', '?'];
            let out = '';
            andarOrdem.forEach(andarKey => {
                if (!porAndar[andarKey] || porAndar[andarKey].length === 0) return;
                out += andarDividerHTML(andarKey);
                porAndar[andarKey].forEach(turmasNaSala => {
                    out += cardHTML(turmasNaSala);
                });
            });
            return out;
        }

        if (totalMat) {
            html += `<div class="turno-sub mat" style="grid-column:1/-1">☀️ Matutino</div>`;
            html += renderTurnoComAndares(matSalas);
        }
        if (totalVesp) {
            html += `<div class="turno-sub vesp" style="grid-column:1/-1">🌅 Vespertino</div>`;
            html += renderTurnoComAndares(vespSalas);
        }

        html += `</div></div>`;
    });

    return html;
}

/* ── Populate prédio select ── */
function popularSelectPredios() {
    const set = new Set();
    allData.forEach(item => set.add(normalizarPredio(item['PREDIO_NOME_TURMADISC'])));
    predioList = Array.from(set).sort((a, b) => a.localeCompare(b, 'pt-BR'));

    const sel = document.getElementById('predioSelect');
    while (sel.options.length > 1) sel.remove(1);
    predioList.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
    });
}

/* ── Render all data ── */
function renderAll() {
    document.getElementById('gradeContent').innerHTML = buildGradeHTML(allData);
    popularSelectPredios();
    applyFilters();
}

/* ── Apply filters: dia + prédio + busca ── */
function applyFilters() {
    const panel = document.getElementById('gradeContent');
    const term  = removerAcentos(searchTerm.toLowerCase().trim());

    panel.querySelectorAll('.dia-section').forEach(sec => {
        const diaKey = sec.getAttribute('data-dia');
        const diaMatch = activeDia === 'todos'
            || (activeDia === 'diaria' && diaKey === '0')
            || activeDia === diaKey;
        sec.classList.toggle('hidden', !diaMatch);
    });

    let visibleCount = 0;
    panel.querySelectorAll('.sala-item').forEach(card => {
        const cardPredi = card.getAttribute('data-predio') || '';
        const predMatch = activePred === 'todos' || cardPredi === activePred;
        const s = card.getAttribute('data-search') || '';
        const termMatch = !term || s.includes(term);
        const visible = predMatch && termMatch;
        card.classList.toggle('hidden', !visible);
        if (visible) visibleCount++;
    });

    panel.querySelectorAll('.andar-divider').forEach(div => {
        const andarKey = div.getAttribute('data-andar-div');
        const grid = div.closest('.grid-salas');
        if (!grid) return;
        const temVisivel = Array.from(grid.querySelectorAll(`.sala-item[data-andar="${andarKey}"]`))
            .some(c => !c.classList.contains('hidden'));
        div.style.display = temVisivel ? '' : 'none';
    });

    panel.querySelectorAll('.grid-salas').forEach(grid => {
        const hasVisible = Array.from(grid.querySelectorAll('.sala-item'))
            .some(c => !c.classList.contains('hidden'));
        let emptyEl = grid.querySelector('.empty-message');
        if (!hasVisible) {
            if (!emptyEl) {
                emptyEl = document.createElement('div');
                emptyEl.className = 'empty-message';
                emptyEl.textContent = '📭 Nenhuma sala neste dia.';
                grid.appendChild(emptyEl);
            }
        } else {
            if (emptyEl) emptyEl.remove();
        }
    });

    panel.querySelectorAll('.dia-section:not(.hidden)').forEach(sec => {
        const allHidden = Array.from(sec.querySelectorAll('.sala-item'))
            .every(c => c.classList.contains('hidden'));
        if (allHidden) sec.classList.add('hidden');
    });

    const noRes = document.getElementById('noResults');
    noRes.classList.toggle('visible', visibleCount === 0);

    document.getElementById('predioBadge').textContent =
        `${visibleCount} sala${visibleCount !== 1 ? 's' : ''}`;

    const infoEl = document.getElementById('searchResultInfo');
    if (term) {
        infoEl.textContent = `${visibleCount} resultado${visibleCount !== 1 ? 's' : ''} para "${searchTerm}"`;
        infoEl.classList.add('visible');
    } else {
        infoEl.classList.remove('visible');
    }
}

/* ── Event wiring ── */
function setupEvents() {
    document.getElementById('predioSelect').addEventListener('change', e => {
        activePred = e.target.value;
        applyFilters();
    });

    document.querySelectorAll('.btn-dia').forEach(btn => {
        btn.addEventListener('click', () => {
            activeDia = btn.getAttribute('data-dia');
            document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        });
    });

    const searchInput = document.getElementById('searchInput');
    const clearBtn    = document.getElementById('clearSearch');
    let debounce;

    searchInput.addEventListener('input', e => {
        searchTerm = e.target.value;
        clearBtn.classList.toggle('visible', searchTerm.trim() !== '');
        clearTimeout(debounce);
        debounce = setTimeout(applyFilters, 260);
    });

    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        searchTerm = '';
        clearBtn.classList.remove('visible');
        applyFilters();
        searchInput.focus();
    });

    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            searchInput.value = '';
            searchTerm = '';
            clearBtn.classList.remove('visible');
            applyFilters();
        }
    });
}

/* ── Load data ── */
async function carregarDados() {
    try {
        const res = await fetch(URL_PLANILHA);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const csv = await res.text();

        const rows = parseCSV(csv);
        if (rows.length < 2) throw new Error('Planilha sem dados suficientes');

        const headers = rows[0].map(h => h.replace(/^"|"$/g,'').trim());
        const items = [];

        for (let i = 1; i < rows.length; i++) {
            const obj = {};
            headers.forEach((h, idx) => {
                obj[h] = (rows[i][idx] || '').replace(/^"|"$/g,'').trim();
            });
            if (obj['CODTURMA']) items.push(obj);
        }

        if (!items.length) throw new Error('Nenhuma turma válida encontrada.');

        allData = items;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('searchContainer').style.display      = 'flex';
        document.getElementById('predioFilterContainer').style.display = 'flex';
        document.getElementById('dayFilterBar').style.display          = 'flex';

        renderAll();
        setupEvents();

    } catch (err) {
        console.error(err);
        const l = document.getElementById('loading');
        l.innerHTML = '⚠️ Erro ao carregar os dados. Verifique a conexão ou tente novamente.<br><small>' + err.message + '</small>';
        l.style.background = 'rgba(211, 44, 77, 0.8)';
        l.style.borderRadius = '30px';
    }
}

window.addEventListener('DOMContentLoaded', carregarDados);
</script>
